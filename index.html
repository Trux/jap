        <a class="channel-name" href="${channelUrl}" target="_blank" rel="noopener noreferrer">[${v.channel}]</a>
        <span class="video-duration">(${v.duration || ""})</span>
      </div>
      <div class="meta-title">
        <a class="video-title" href="${v.url}" target="_blank" rel="noopener noreferrer">${v.title}</a>
      </div>
      <div class="timestamp">Published: ${v.date_str}</div>
    </div>`;
  list.appendChild(li);
});
</script>
</body>
</html>
